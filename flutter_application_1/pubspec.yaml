name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.7
  file_picker: ^8.0.2
  path_provider: ^2.1.1
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^7.2.0
  universal_io: ^2.2.2
  shared_preferences: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.10.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

# Configuration for automatic icon generation
flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
